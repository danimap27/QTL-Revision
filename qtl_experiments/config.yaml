# ==============================================================================
# QTL Revision - Experiment Configuration
# Paper: Hybrid Classical-Quantum Transfer Learning with Noisy Quantum Circuits
# ==============================================================================

experiment_name: "qtl_revision_v2"
output_dir: "./results"
checkpoint_dir: "./checkpoints"
device: "auto"  # "auto", "cpu", "cuda"

# === SEEDS ===
seeds: [0, 42, 123, 456, 789]

# === DATASETS ===
datasets:
  - name: "hymenoptera"
    path: "./data/datasets/hymenoptera"
    num_classes: 2
    image_size: 224
  - name: "brain_tumor"
    path: "./data/datasets/brain_tumor"
    num_classes: 2
    image_size: 224
  - name: "cats_dogs"
    path: "./data/datasets/cats_dogs"
    num_classes: 2
    image_size: 224
  - name: "solar_dust"
    path: "./data/datasets/solar_dust"
    num_classes: 2
    image_size: 224

# === BACKBONES ===
backbones:
  - name: "resnet18"
    feature_dim: 512
  - name: "mobilenetv2"
    feature_dim: 1280
  - name: "efficientnet_b0"
    feature_dim: 1280
  - name: "regnet_x_400mf"
    feature_dim: 400

# === QUBIT / DEPTH GRID (for quantum heads) ===
# The runner expands each quantum head into all (qubits x depths) combinations
qubit_configs: [4, 8, 16]
depth_configs: [1, 3, 5]

# === HEADS ===
heads:
  # --- Classical (no qubit/depth expansion) ---
  - name: "linear"
    type: "classical"
    description: "Baseline: single linear layer"

  - name: "mlp_a"
    type: "classical"
    description: "MLP parameter-matched (~12 params): Linear->tanh->Linear"
    hidden_dim: 4
    activation: "tanh"

  - name: "mlp_b"
    type: "classical"
    description: "MLP standard: 128->ReLU->64->ReLU->C"
    hidden_dims: [128, 64]
    activation: "relu"

  # --- PennyLane ---
  - name: "pl_ideal"
    type: "pennylane"
    description: "PennyLane ideal (default.qubit, parameter-shift)"
    backend: "default.qubit"
    noise: false

  - name: "pl_noisy"
    type: "pennylane"
    description: "PennyLane noisy (default.mixed, Heron r2 calibration)"
    backend: "default.mixed"
    noise: true
    noise_params:
      T1_us: 250
      T2_us: 150
      t1q_ns: 32
      t2q_ns: 68
      p1q: 0.0002
      p2q: 0.005
      readout_error: 0.012

  # --- Qiskit ---
  - name: "qk_ideal"
    type: "qiskit"
    description: "Qiskit ideal (StatevectorSampler)"
    backend: "statevector"
    noise: false
    shots: null

  - name: "qk_noisy"
    type: "qiskit"
    description: "Qiskit noisy (AerSampler, Heron r2)"
    backend: "aer"
    noise: true
    shots: 1024
    noise_params:
      T1_us: 250
      T2_us: 150
      p1q: 0.0002
      p2q: 0.005
      readout_error: 0.012

# === TRAINING ===
training:
  optimizer: "adam"
  lr: 0.001
  batch_size: 16
  epochs: 10
  scheduler:
    type: "step_lr"
    step_size: 3
    gamma: 0.9
  loss: "cross_entropy"
  early_stopping_patience: 15

# === ENERGY TRACKING ===
energy:
  enabled: true
  tool: "codecarbon"

# === CHECKPOINTS ===
checkpoints:
  save_every_epoch: true
  save_final_model: true

# ==============================================================================
# EXTENSION EXPERIMENTS (reviewer requests)
# Enable individually. These generate ADDITIONAL runs beyond the main grid.
# ==============================================================================

# --- M1: SPSA optimizer control (reviewer M1) ---
# Runs PennyLane ideal with SPSA instead of Adam to isolate optimizer confound
spsa_control:
  enabled: true
  datasets: ["hymenoptera", "brain_tumor"]
  backbones: ["resnet18", "mobilenetv2", "efficientnet_b0", "regnet_x_400mf"]
  n_qubits: 4
  depth: 3
  seeds: [0, 42, 123, 456, 789]
  # Total: 2 datasets x 4 backbones x 5 seeds = 40 runs

# --- M2: Barren plateau analysis (reviewer M2) ---
# Separate script: measures gradient variance via parameter-shift
barren_plateaus:
  enabled: true
  datasets: ["hymenoptera"]
  backbones: ["resnet18"]
  head: "pl_ideal"
  n_initializations: 200
  qubits: [2, 4, 6, 8, 16]
  depths: [1, 2, 3, 4, 5]
  # Total: 5 qubits x 5 depths = 25 configs (CPU-only, no SLURM GPU needed)

# --- M4: Fine-grained ablation (reviewer M4) ---
# Denser qubit/depth sweep beyond the main [4,8,16]x[1,3,5] grid
ablation:
  enabled: true
  datasets: ["hymenoptera", "brain_tumor"]
  backbones: ["resnet18"]
  heads: ["pl_ideal"]
  qubits: [1, 2, 3, 4, 5, 6, 7, 8]
  depths: [1, 2, 3, 4, 5]
  seeds: [0, 42, 123, 456, 789]
  # Total: 8 qubits x 5 depths x 2 datasets x 5 seeds = 400 runs

# --- M8: Noise decomposition (reviewer M8) ---
# Isolate individual noise channels to understand which matters most
noise_decomposition:
  enabled: true
  datasets: ["hymenoptera", "brain_tumor"]
  backbones: ["resnet18"]
  n_qubits: 4
  depth: 3
  channels:
    - name: "ideal"
      noise: false
    - name: "amplitude_damping"
      noise: true
      noise_params: {T1_us: 250, T2_us: 99999, t1q_ns: 32, t2q_ns: 68, p1q: 0, p2q: 0, readout_error: 0}
    - name: "phase_damping"
      noise: true
      noise_params: {T1_us: 99999, T2_us: 150, t1q_ns: 32, t2q_ns: 68, p1q: 0, p2q: 0, readout_error: 0}
    - name: "depolarizing"
      noise: true
      noise_params: {T1_us: 99999, T2_us: 99999, t1q_ns: 32, t2q_ns: 68, p1q: 0.0002, p2q: 0.005, readout_error: 0}
    - name: "readout_only"
      noise: true
      noise_params: {T1_us: 99999, T2_us: 99999, t1q_ns: 32, t2q_ns: 68, p1q: 0, p2q: 0, readout_error: 0.012}
    - name: "full_noise"
      noise: true
      noise_params: {T1_us: 250, T2_us: 150, t1q_ns: 32, t2q_ns: 68, p1q: 0.0002, p2q: 0.005, readout_error: 0.012}
  seeds: [0, 42, 123, 456, 789]
  # Total: 6 channels x 2 datasets x 5 seeds = 60 runs

# === HERCULES MULTI-ACCOUNT ===
hercules:
  accounts:
    - name: "account1"
      user: "user1"
      partition: "gpu"
      max_concurrent: 80
    - name: "account2"
      user: "user2"
      partition: "gpu"
      max_concurrent: 80
    - name: "account3"
      user: "user3"
      partition: "gpu"
      max_concurrent: 80
  default_resources:
    gres: "gpu:a100:1"
    mem: "32G"
    cpus_per_task: 8
    time: "04:00:00"

# ==============================================================================
# RUN COUNT SUMMARY
# ==============================================================================
# Main grid:
#   Classical: 3 heads x 4 backbones x 4 datasets x 5 seeds        =   240
#   Quantum:   4 heads x 3 qubits x 3 depths x 4 BB x 4 DS x 5 S  = 2,880
#   Main total:                                                       3,120
#
# Extensions:
#   SPSA control (M1):     40
#   Ablation (M4):        400
#   Noise decomp (M8):     60
#   Barren plateaus (M2):  25 configs (CPU, separate script)
#
# GRAND TOTAL: 3,620 GPU runs + 25 CPU configs
